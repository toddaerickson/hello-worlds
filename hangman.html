<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hangman</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 1.4rem;
    color: #e74c3c;
    margin-bottom: 2px;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 10px;
    font-style: italic;
  }

  .stats {
    font-size: 0.85rem;
    color: #aaa;
    margin-bottom: 8px;
  }

  .hangman-canvas {
    width: 160px;
    height: 160px;
    margin: 0 auto 8px;
  }

  .word-display {
    font-size: 1.5rem;
    letter-spacing: 4px;
    text-align: center;
    margin: 8px 0;
    min-height: 2.5rem;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    color: #f0f0f0;
    word-break: break-word;
    max-width: 100%;
    padding: 0 8px;
    line-height: 2;
  }

  .word-display .space {
    display: inline-block;
    width: 14px;
  }

  .guesses-left {
    font-size: 0.85rem;
    color: #e74c3c;
    margin-bottom: 8px;
  }

  .wrong-letters {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 10px;
    min-height: 1.2rem;
  }

  .keyboard {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    max-width: 350px;
    width: 100%;
    margin: 0 auto;
  }

  .key {
    background: #2d2d44;
    border: 1px solid #444;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 10px 0;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-user-select: none;
    user-select: none;
  }

  .key:active {
    transform: scale(0.92);
  }

  .key.correct {
    background: #27ae60;
    border-color: #2ecc71;
    color: #fff;
  }

  .key.wrong {
    background: #5a2d2d;
    border-color: #e74c3c;
    color: #999;
  }

  .key.disabled {
    pointer-events: none;
    opacity: 0.4;
  }

  .message {
    font-size: 1.1rem;
    text-align: center;
    margin: 12px 0;
    min-height: 1.5rem;
    font-weight: bold;
  }

  .message.win { color: #2ecc71; }
  .message.lose { color: #e74c3c; }

  .btn {
    background: #e74c3c;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-size: 1rem;
    font-family: 'Georgia', serif;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .btn:hover { background: #c0392b; }
  .btn:active { transform: scale(0.96); }

  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px 0;
    width: 100%;
  }

  #start-screen p {
    color: #aaa;
    margin: 6px 0;
    font-size: 0.95rem;
  }

  .category-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 16px 0;
    width: 100%;
    max-width: 300px;
  }

  .category-btn {
    background: #2d2d44;
    border: 2px solid #444;
    border-radius: 10px;
    color: #e0e0e0;
    font-family: 'Georgia', serif;
    font-size: 1rem;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    text-align: center;
  }

  .category-btn:hover { background: #3d3d54; border-color: #888; }
  .category-btn:active { transform: scale(0.96); }

  .category-btn .cat-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
  .category-btn .cat-name { font-weight: bold; }
  .category-btn .cat-desc { font-size: 0.75rem; color: #999; margin-top: 2px; }

  #game-screen { display: none; width: 100%; max-width: 400px; position: relative; }

  .home-btn {
    position: absolute;
    top: 0;
    left: 0;
    background: none;
    border: 1px solid #555;
    border-radius: 6px;
    color: #aaa;
    font-size: 0.8rem;
    font-family: 'Georgia', serif;
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .home-btn:hover { color: #e0e0e0; border-color: #888; }
  .home-btn:active { transform: scale(0.95); }

  .skull { font-size: 3rem; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="start-screen">
  <div class="skull">&#127925;</div>
  <h1>Music &amp; Culture<br>Hangman</h1>
  <br>
  <p>Pick a category, guess one letter at a time.<br>You get 6 wrong guesses.</p>
  <div class="category-grid">
    <button class="category-btn" onclick="startGame('dead')">
      <span class="cat-icon">&#9760;</span>
      <span class="cat-name">Grateful Dead</span>
      <span class="cat-desc">Classic song titles</span>
    </button>
    <button class="category-btn" onclick="startGame('college')">
      <span class="cat-icon">&#127911;</span>
      <span class="cat-name">College Trending</span>
      <span class="cat-desc">Modern hits &amp; viral tracks</span>
    </button>
    <button class="category-btn" onclick="startGame('fashion')">
      <span class="cat-icon">&#128132;</span>
      <span class="cat-name">Trendy Brands</span>
      <span class="cat-desc">Fashion &amp; beauty from Sephora &amp; beyond</span>
    </button>
    <button class="category-btn" onclick="startGame('knitting')">
      <span class="cat-icon">&#129526;</span>
      <span class="cat-name">Knitting</span>
      <span class="cat-desc">Stitches, tools &amp; yarn vocabulary</span>
    </button>
    <button class="category-btn" onclick="startGame('biology')">
      <span class="cat-icon">&#128300;</span>
      <span class="cat-name">9th Grade Biology</span>
      <span class="cat-desc">Cells, genetics &amp; ecosystems</span>
    </button>
    <button class="category-btn" onclick="startGame('colors')">
      <span class="cat-icon">&#127912;</span>
      <span class="cat-name">Rare Colors</span>
      <span class="cat-desc">Obscure &amp; beautiful color names</span>
    </button>
  </div>
</div>

<div id="game-screen">
  <button class="home-btn" onclick="goHome()">&#8592; Home</button>
  <h1 id="game-title">Hangman</h1>
  <div class="subtitle" id="game-subtitle">guess the word</div>
  <div class="stats" id="stats"></div>

  <canvas class="hangman-canvas" id="canvas" width="160" height="160"></canvas>

  <div class="word-display" id="word-display"></div>
  <div class="guesses-left" id="guesses-left"></div>
  <div class="wrong-letters" id="wrong-letters"></div>

  <div class="message" id="message"></div>

  <div class="keyboard" id="keyboard"></div>

  <div style="text-align:center; margin-top: 12px;">
    <button class="btn" id="next-btn" style="display:none;" onclick="nextRound()">Next Word</button>
  </div>
</div>

const MAX_WRONG = 6;
let currentCategory = "dead";
let currentWord = "";
let correctGuesses = new Set();
let wrongGuesses = new Set();
let wrongCount = 0;
let wins = 0;
let games = 0;
let gameOver = false;

function startGame(category) {
  currentCategory = category;
  document.getElementById("game-title").textContent = CATEGORIES[category].title;
  document.getElementById("game-subtitle").textContent = CATEGORIES[category].subtitle;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game-screen").style.display = "block";
  wins = 0;
  games = 0;
  nextRound();
}

function goHome() {
  document.getElementById("game-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "flex";
  wins = 0;
  games = 0;
}

function nextRound() {
  const cat = CATEGORIES[currentCategory];
  currentWord = cat.words[Math.floor(Math.random() * cat.words.length)];
  correctGuesses = new Set();
  wrongGuesses = new Set();
  wrongCount = 0;
  gameOver = false;

  document.getElementById("message").textContent = "";
  document.getElementById("message").className = "message";
  document.getElementById("next-btn").style.display = "none";
  document.getElementById("stats").textContent = games > 0
    ? `Score: ${wins} / ${games}`
    : "";

  buildKeyboard();
  updateDisplay();
  drawHangman();
}

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  for (let i = 65; i <= 90; i++) {
    const letter = String.fromCharCode(i);
    const btn = document.createElement("div");
    btn.className = "key";
    btn.textContent = letter;
    btn.dataset.letter = letter;
    btn.addEventListener("click", () => guessLetter(letter));
    kb.appendChild(btn);
  }
}

function guessLetter(letter) {
  if (gameOver) return;
  if (correctGuesses.has(letter) || wrongGuesses.has(letter)) return;

  const keyEl = document.querySelector(`.key[data-letter="${letter}"]`);

  if (currentWord.toUpperCase().includes(letter)) {
    correctGuesses.add(letter);
    if (keyEl) keyEl.classList.add("correct");
  } else {
    wrongGuesses.add(letter);
    wrongCount++;
    if (keyEl) keyEl.classList.add("wrong");
  }

  updateDisplay();
  drawHangman();
  checkGameState();
}

function updateDisplay() {
  // Word display
  const wordEl = document.getElementById("word-display");
  let html = "";
  for (const ch of currentWord) {
    if (ch === " ") {
      html += '<span class="space"></span>';
    } else if (!isAlpha(ch)) {
      html += ch;
    } else if (correctGuesses.has(ch.toUpperCase())) {
      html += ch;
    } else {
      html += "_";
    }
  }
  wordEl.innerHTML = html;

  // Guesses left
  document.getElementById("guesses-left").textContent =
    `Guesses left: ${MAX_WRONG - wrongCount}`;

  // Wrong letters
  const wrongArr = Array.from(wrongGuesses).sort();
  document.getElementById("wrong-letters").textContent =
    wrongArr.length > 0 ? `Misses: ${wrongArr.join(", ")}` : "";
}

function checkGameState() {
  const cat = CATEGORIES[currentCategory];
  if (isSolved()) {
    gameOver = true;
    games++;
    wins++;
    const msg = document.getElementById("message");
    msg.textContent = cat.winMsg(currentWord);
    msg.className = "message win";
    disableKeyboard();
    document.getElementById("next-btn").style.display = "inline-block";
    document.getElementById("stats").textContent = `Score: ${wins} / ${games}`;
  } else if (wrongCount >= MAX_WRONG) {
    gameOver = true;
    games++;
    const msg = document.getElementById("message");
    msg.textContent = cat.loseMsg(currentWord);
    msg.className = "message lose";
    disableKeyboard();
    document.getElementById("next-btn").style.display = "inline-block";
    document.getElementById("stats").textContent = `Score: ${wins} / ${games}`;
  }
}

function isSolved() {
  for (const ch of currentWord) {
    if (isAlpha(ch) && !correctGuesses.has(ch.toUpperCase())) return false;
  }
  return true;
}

function isAlpha(ch) {
  return /^[A-Za-z]$/.test(ch);
}

function disableKeyboard() {
  document.querySelectorAll(".key").forEach(k => k.classList.add("disabled"));
}

// --- Canvas drawing ---

function drawHangman() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 160, 160);
  ctx.strokeStyle = "#e0e0e0";
  ctx.lineWidth = 2;
  ctx.lineCap = "round";

  // Base
  ctx.beginPath(); ctx.moveTo(10, 150); ctx.lineTo(60, 150); ctx.stroke();
  // Pole
  ctx.beginPath(); ctx.moveTo(35, 150); ctx.lineTo(35, 20); ctx.stroke();
  // Top beam
  ctx.beginPath(); ctx.moveTo(35, 20); ctx.lineTo(110, 20); ctx.stroke();
  // Rope
  ctx.beginPath(); ctx.moveTo(110, 20); ctx.lineTo(110, 40); ctx.stroke();

  if (wrongCount >= 1) {
    // Head
    ctx.beginPath(); ctx.arc(110, 52, 12, 0, Math.PI * 2); ctx.stroke();
  }
  if (wrongCount >= 2) {
    // Body
    ctx.beginPath(); ctx.moveTo(110, 64); ctx.lineTo(110, 105); ctx.stroke();
  }
  if (wrongCount >= 3) {
    // Left arm
    ctx.beginPath(); ctx.moveTo(110, 75); ctx.lineTo(88, 92); ctx.stroke();
  }
  if (wrongCount >= 4) {
    // Right arm
    ctx.beginPath(); ctx.moveTo(110, 75); ctx.lineTo(132, 92); ctx.stroke();
  }
  if (wrongCount >= 5) {
    // Left leg
    ctx.beginPath(); ctx.moveTo(110, 105); ctx.lineTo(88, 130); ctx.stroke();
  }
  if (wrongCount >= 6) {
    // Right leg
    ctx.beginPath(); ctx.moveTo(110, 105); ctx.lineTo(132, 130); ctx.stroke();
  }
}

// Physical keyboard support
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    goHome();
    return;
  }
  const key = e.key.toUpperCase();
  if (/^[A-Z]$/.test(key)) {
    guessLetter(key);
  }
});
</script>
